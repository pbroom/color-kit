name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Enforce pre-production package versions
        run: pnpm check:preprod

      - name: Build packages
        env:
          COLOR_KIT_SKIP_WASM_GENERATED: '1'
        run: pnpm build

      - name: Validate package metadata artifacts
        run: pnpm check:artifacts:metadata

      - name: Run tests
        env:
          COLOR_KIT_SKIP_WASM_GENERATED: '1'
        run: pnpm test

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Check agent learnings integrity
        run: pnpm agents:check:strict

      - name: Check formatting
        run: pnpm format:check

      - name: Run lint (including React Compiler hooks rules)
        run: pnpm lint

  # wasm-build and wasm-parity-gate moved to .github/workflows/wasm.yml,
  # gated to WASM-relevant paths plus a weekly schedule and manual dispatch.

  plane-bench:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build core package
        run: pnpm --filter @color-kit/core build

      - name: Run plane benchmark
        run: pnpm --filter @color-kit/core bench:plane > plane-bench-results.json

      - name: Upload plane benchmark artifact
        uses: actions/upload-artifact@v4
        with:
          name: plane-bench-results
          path: plane-bench-results.json
