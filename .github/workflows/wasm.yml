name: WASM

# The Rust/WASM path is parked: the kernel currently accelerates only
# contrast-path normalization, so these jobs run on WASM-relevant changes,
# a weekly schedule, and manual dispatch instead of on every PR.
# Full-fidelity WASM validation still runs in release:verify before publishes.

on:
  push:
    branches: [main]
    paths:
      - 'packages/core-wasm/**'
      - 'packages/react/src/workers/**'
      - 'packages/react/__tests__/plane-query-worker-*.test.ts'
      - 'packages/react/__tests__/wasm-parity-gate.test.ts'
      - '.github/workflows/wasm.yml'
  pull_request:
    paths:
      - 'packages/core-wasm/**'
      - 'packages/react/src/workers/**'
      - 'packages/react/__tests__/plane-query-worker-*.test.ts'
      - 'packages/react/__tests__/wasm-parity-gate.test.ts'
      - '.github/workflows/wasm.yml'
  schedule:
    # Weekly safety net so silent breakage on untouched paths still surfaces.
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  wasm-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked

      - name: Build and validate wasm kernel package
        run: pnpm ci:wasm

      - name: Build and validate published package artifacts
        run: pnpm --filter color-kit build && pnpm check:artifacts

  wasm-parity-gate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked

      - name: Run strict wasm parity gate
        run: pnpm ci:wasm-parity
