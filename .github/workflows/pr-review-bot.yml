name: PR Review Bot

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    name: Structured PR review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate structured review
        run: bash scripts/generate_pr_review.sh > review.md

      - name: Upload review artifact
        uses: actions/upload-artifact@v4
        with:
          name: pr-review
          path: review.md

      - name: Upsert sticky PR comment
        if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("node:fs");
            const marker = "<!-- pr-review-bot -->";
            const reviewBody = fs.readFileSync("review.md", "utf8");
            const commentBody = `${marker}\n${reviewBody}`;

            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find((comment) => comment.body && comment.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body: commentBody,
              });
              core.info(`Updated sticky review comment #${existing.id}`);
            } else {
              const created = await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body: commentBody,
              });
              core.info(`Created sticky review comment #${created.data.id}`);
            }

      - name: Skip comment on forked PRs
        if: ${{ github.event.pull_request.head.repo.full_name != github.repository }}
        run: echo "Skipping PR comment for forked PR; review artifact is still uploaded."
