<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Plane API Quick Start HTML Demo</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        background: #121314;
      }

      svg {
        display: block;
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <svg
      viewBox="0 0 100 100"
      role="img"
      aria-label="Display P3 gamut boundary projected to a plane"
    >
      <rect x="0" y="0" width="100" height="100" fill="#121314"></rect>
      <path
        data-plane-boundary
        fill="oklch(82.8% 0.111 230.318 / 0.08)"
        stroke="oklch(68.5% 0.169 237.323)"
        stroke-width="0.5"
      ></path>
    </svg>

    <script type="module">
      // @ck-snippet-compact-start
      import {
        createPlaneQuery,
        definePlane,
        toSvgPath,
      } from '@color-kit/core';

      const resolvedPlane = definePlane({ fixed: { h: 250, alpha: 1 } });
      const query = createPlaneQuery(resolvedPlane);
      const p3Boundary = query.gamutBoundary({
        gamut: 'display-p3',
        samplingMode: 'adaptive',
      });
      const boundaryPath = toSvgPath(p3Boundary.points, {
        closeLoop: true,
        precision: 2,
      });

      const boundaryNode = document.querySelector('[data-plane-boundary]');
      if (boundaryNode instanceof SVGPathElement) {
        boundaryNode.setAttribute('d', boundaryPath);
      }
      // @ck-snippet-compact-end
    </script>
  </body>
</html>
